<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GitHub Algol22</title>
  <style>
    body {
      background-color: #222;
      color: #999;
      font-family: Verdana;
      font-size: 9pt;
      padding: 0px;
      margin: 0px;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      margin-bottom: 40px;
    }

    .button {
      display: inline-block;
      padding: 10px 20px;
      background-color: #55c500;
      color: #fff;
      font-size: 16px;
      text-decoration: none;
      border-radius: 4px;
      transition: background-color 0.3s ease;
    }

    .button:hover {
      background-color: #449400;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to GitHub Algol22</h1>
    <p>Explore the amazing world of Algol22 on GitHub.</p>
    <p id="clientInfo"></p>
    <a href="#" class="button">Get Started</a>
  </div>

  <script>
    function getClientInfo() {
      const clientInfoElement = document.getElementById("clientInfo");

      // Get browser information
      const browser = {
        name: window.navigator.appName,
        version: window.navigator.appVersion,
        platform: window.navigator.platform,
        userAgent: window.navigator.userAgent,
      };

      // Get country information (using freegeoip.app API)
      fetch("https://freegeoip.app/json/")
        .then(response => response.json())
        .then(data => {
          const country = data.country_name;
          const ip = data.ip;

          // Display client information
          clientInfoElement.innerHTML = `Browser: ${browser.name} (${browser.version})<br>
                                          Platform: ${browser.platform}<br>
                                          Country: ${country}<br>
                                          IP: ${ip}`;
        })
        .catch(error => {
          console.log("Error fetching country information:", error);
          clientInfoElement.innerHTML = "Failed to fetch client information.";
        });
    }

    // Call the function to display client information
    getClientInfo();
  </script>
</body>
</html>
