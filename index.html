<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GitHub Algol22</title>
  <style>
    body {
      background-color: #222;
      color: #999;
      font-family: Verdana;
      font-size: 9pt;
      padding: 0px;
      margin: 0px;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      margin-bottom: 40px;
    }

    .button {
      display: inline-block;
      padding: 10px 20px;
      background-color: #55c500;
      color: #fff;
      font-size: 16px;
      text-decoration: none;
      border-radius: 4px;
      transition: background-color 0.3s ease;
    }

    .button:hover {
      background-color: #449400;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to GitHub Algol22</h1>
    <p>Explore the amazing world of Algol22 on GitHub.</p>
    <div id="user-info">
      <p>Loading user information...</p>
    </div>
    <a href="#" class="button">Get Started</a>
  </div>

  <script>
    // Fetch user information
    fetch('https://api.ipify.org?format=json')
      .then(response => response.json())
      .then(data => {
        const { ip } = data;
        fetch(`https://ipapi.co/${ip}/json/`)
          .then(response => response.json())
          .then(user => {
            displayUserInfo(user);
          })
          .catch(error => {
            displayError(error);
          });
      })
      .catch(error => {
        displayError(error);
      });

    // Display user information
    function displayUserInfo(user) {
      const userInfoDiv = document.getElementById('user-info');
      userInfoDiv.innerHTML = `
        <p>Browser: ${navigator.userAgent}</p>
        <p>Country: ${user.country_name}</p>
        <p>City: ${user.city}</p>
        <p>IP: ${user.ip}</p>
      `;
    }

    // Display error message
    function displayError(error) {
      const userInfoDiv = document.getElementById('user-info');
      userInfoDiv.innerHTML = `<p>Failed to fetch user information: ${error.message}</p>`;
    }
  </script>
</body>
</html>
