<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Minimalistic Page</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: url('https://images.unsplash.com/photo-1470399542183-e6245d78c479?q=80&w=2574&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') center/cover no-repeat fixed;
            color: #fff;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Make the body take the full height of the viewport */
        }

        header, section, footer {
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 1em 2em;
            margin: 1em;
            border-radius: 10px; /* Add border-radius for a subtle rounded corner effect */
        }

        h1 {
            color: #333;
        }

        p {
            font-size: 1.2em;
            line-height: 1.6em;
            color: #555;
        }
    </style>
</head>
<body>

    <header>
        <h1>Your Minimalistic Page</h1>
    </header>

    <section>
        <p>Hello, world! This is a minimalistic landing page. Customize it to suit your needs.</p>
    </section>

    <footer>
        <p>&copy; 2024 Your Name | <a href="mailto:YourEmail@example.com">YourEmail@example.com</a></p>
    </footer>

</body>
</html>
