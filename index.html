<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GitHub Algol22</title>
  <style>
    body {
      background-color: #222;
      color: #999;
      font-family: Verdana;
      font-size: 9pt;
      padding: 0px;
      margin: 0px;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      padding: 0 20px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }

    p {
      font-size: 14px;
      margin-bottom: 40px;
    }

    .button {
      display: inline-block;
      padding: 10px 20px;
      background-color: #55c500;
      color: #fff;
      font-size: 16px;
      text-decoration: none;
      border-radius: 4px;
      transition: background-color 0.3s ease;
    }

    .button:hover {
      background-color: #449400;
    }

    #user-info {
      margin-top: 40px;
      overflow-x: auto;
    }

    table {
      margin: 0 auto;
      border-collapse: collapse;
      width: 100%;
      max-width: 400px;
    }

    th,
    td {
      padding: 8px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }

    th {
      background-color: #333;
      color: #fff;
    }

    .preloader {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    @media only screen and (max-width: 480px) {
      h1 {
        font-size: 20px;
      }

      p {
        font-size: 12px;
      }

      table {
        font-size: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to GitHub Algol22</h1>
    <p>Explore the amazing world of Algol22 on GitHub.</p>
    <div id="preloader" class="preloader"></div>
    <div id="user-info"></div>
    <a href="#" class="button">Get Started</a>
  </div>

  <script>
    const preloader = document.getElementById('preloader');
    const userInfoDiv = document.getElementById('user-info');

    // Show preloader
    function showPreloader() {
      preloader.style.display = 'inline-block';
    }

    // Hide preloader
    function hidePreloader() {
      preloader.style.display = 'none';
    }

    // Fetch user information
    fetch('https://api.ipify.org?format=json')
      .then(response => response.json())
      .then(data => {
        const { ip } = data;
        fetch(`https://ipapi.co/${ip}/json/`)
          .then(response => response.json())
          .then(user => displayUserInfo(user))
          .catch(error => displayError(error));
      })
      .catch(error => displayError(error));

    // Display user information
    function displayUserInfo(user) {
      hidePreloader();

      const table = document.createElement('table');
      table.innerHTML = `
        <tbody>
          <tr>
            <th>Property</th>
            <th>Value</th>
          </tr>
          <tr>
            <td>Browser</td>
            <td>${navigator.userAgent}</td>
          </tr>
          <tr>
            <td>Country</td>
            <td>${user.country_name}</td>
          </tr>
          <tr>
            <td>City</td>
            <td>${user.city}</td>
          </tr>
          <tr>
            <td>IP</td>
            <td>${user.ip}</td>
          </tr>
        </tbody>
      `;
      userInfoDiv.appendChild(table);
    }

    // Display error message
    function displayError(error) {
      hidePreloader();
      userInfoDiv.innerHTML = `<p>Failed to fetch user information: ${error.message}</p>`;
    }
  </script>
</body>
</html>
