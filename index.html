<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Minimalistic Page</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f8f8;
            color: #333;
            text-align: center;
        }

        header {
            background-color: #333;
            color: #fff;
            padding: 1em 0;
        }

        section {
            padding: 2em;
        }

        h1 {
            color: #333;
        }

        p {
            font-size: 1.2em;
            line-height: 1.6em;
            color: #555;
        }

        footer {
            background-color: #333;
            color: #fff;
            padding: 1em 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>Your Minimalistic Page</h1>
    </header>

    <section>
        <p>Hello, world! This is a minimalistic landing page. Customize it to suit your needs.</p>
    </section>

    <footer>
        <p>&copy; 2024 Your Name | <a href="mailto:YourEmail@example.com">YourEmail@example.com</a></p>
    </footer>

</body>
</html>
